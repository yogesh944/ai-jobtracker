version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: job_tracker_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "7@6#5$ld"
      POSTGRES_DB: ai_job_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: job_tracker_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:7%406%235%24ld@db:5432/ai_job_tracker
      - SECRET_KEY=yogeshsecret123
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - ./backend/app/uploads:/app/app/uploads

  frontend:
    build: ./frontend
    container_name: job_tracker_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
